<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘媛媛 · Ellie Liu · Web3 Community Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#09090b;--surface:#111113;--surface2:#18181c;--gold:#c8a96e;--gold-dim:rgba(200,169,110,0.1);--gold-border:rgba(200,169,110,0.22);--teal:#4a9e8a;--text:#e4e0d8;--text-muted:#7a7670;--text-dim:#3e3d3a;--border:rgba(255,255,255,0.055);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes lineGrow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
.fu{opacity:0;animation:fadeUp .6s ease forwards;}
.d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.2s}.d4{animation-delay:.28s}.d5{animation-delay:.36s}.d6{animation-delay:.44s}.d7{animation-delay:.52s}.d8{animation-delay:.6s}
.lang-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;display:flex;background:var(--surface);border:.5px solid var(--border);border-radius:3px;overflow:hidden;}
.lt-btn{padding:6px 14px;font-size:11px;letter-spacing:.08em;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.lt-btn.active{background:var(--gold-dim);color:var(--gold);}
.lt-btn:hover:not(.active){color:var(--text);}
.en{display:block;}.es{display:none;}.zh{display:none;}
body.es-mode .en{display:none;}body.es-mode .es{display:block;}body.es-mode .zh{display:none;}
body.zh-mode .en{display:none;}body.zh-mode .zh{display:block;}body.zh-mode .es{display:none;}
.wrap{max-width:980px;margin:0 auto;padding:4rem 2.5rem 7rem;}
.hdr{display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:end;padding-bottom:2.5rem;margin-bottom:3rem;position:relative;}
.hdr-line{position:absolute;bottom:0;left:0;right:0;height:.5px;background:linear-gradient(90deg,var(--gold) 0%,rgba(200,169,110,0.08) 70%,transparent 100%);transform-origin:left;animation:lineGrow 1.1s cubic-bezier(.4,0,.2,1) forwards .2s;transform:scaleX(0);}
.name{font-family:'Cormorant Garamond',serif;font-size:4.6rem;font-weight:300;line-height:.92;letter-spacing:-.015em;}
.name-sub{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;font-style:italic;color:var(--gold);margin-top:.5rem;letter-spacing:.05em;}
.badge{display:inline-flex;align-items:center;gap:8px;margin-top:.9rem;padding:5px 13px;border:.5px solid var(--gold-border);border-radius:2px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:var(--gold-dim);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2.2s ease infinite;}
.contact{text-align:right;display:flex;flex-direction:column;gap:5px;padding-top:.3rem;}
.contact-row{font-size:12px;color:var(--text-muted);font-weight:300;display:flex;align-items:center;justify-content:flex-end;gap:7px;}
.contact-row a{color:var(--text-muted);text-decoration:none;transition:color .2s;}
.contact-row a:hover{color:var(--gold);}
.body{display:grid;grid-template-columns:240px 1fr;gap:4rem;}
.slabel{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1.1rem;display:flex;align-items:center;gap:10px;}
.slabel::after{content:'';flex:1;height:.5px;background:var(--border);}
.sidebar{display:flex;flex-direction:column;gap:2.25rem;}
.intro{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;font-style:italic;color:var(--text-muted);line-height:1.85;}
.skill-group{margin-bottom:.9rem;}
.sg-name{font-size:10.5px;color:var(--gold);margin-bottom:6px;font-weight:500;}
.tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:11px;padding:3px 9px;border:.5px solid var(--border);border-radius:2px;color:var(--text-muted);background:var(--surface);transition:all .2s;cursor:default;}
.tag:hover{border-color:var(--gold-border);color:var(--gold);background:var(--gold-dim);}
.lang-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.lang-name{font-size:12px;color:var(--text);min-width:56px;}
.lang-bar{width:88px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.lang-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--gold));}
.lang-level{font-size:10px;color:var(--text-dim);min-width:52px;text-align:right;}
.main{display:flex;flex-direction:column;gap:2.5rem;}
.summary-card{background:var(--surface);border:.5px solid var(--border);border-left:2px solid var(--gold);border-radius:2px;padding:1.25rem 1.4rem;}
.summary-text{font-size:13px;color:var(--text-muted);line-height:1.85;}
.summary-text strong{color:var(--gold);font-weight:500;}
.target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.target-card{background:var(--surface);border:.5px solid var(--border);border-radius:2px;padding:.75rem 1rem;transition:border-color .2s;}
.target-card:hover{border-color:var(--gold-border);}
.target-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:2px;background:rgba(74,158,138,0.1);color:var(--teal);border:.5px solid rgba(74,158,138,0.25);margin-bottom:5px;}
.target-role{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:3px;}
.target-desc{font-size:11px;color:var(--text-muted);line-height:1.55;}
.aba-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.aba-card{background:var(--surface);border:.5px solid var(--border);border-radius:2px;padding:1rem 1.1rem;transition:border-color .25s;}
.aba-card:hover{border-color:var(--gold-border);}
.aba-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px;}
.aba-icon{min-width:24px;height:24px;border-radius:2px;background:var(--gold-dim);border:.5px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:11px;}
.aba-title{font-size:11.5px;font-weight:500;color:var(--text);margin-bottom:2px;}
.aba-web3{font-size:10.5px;color:var(--teal);}
.aba-desc{font-size:11.5px;color:var(--text-muted);line-height:1.65;}
.exp-item{padding-bottom:1.75rem;margin-bottom:1.75rem;border-bottom:.5px solid var(--border);}
.exp-item:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
.exp-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.3rem;}
.exp-company{font-size:14px;font-weight:500;color:var(--text);}
.exp-date{font-size:11px;color:var(--text-dim);white-space:nowrap;padding-top:2px;}
.exp-role{font-size:12px;color:var(--gold);margin-bottom:.5rem;}
.exp-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:5px;}
.exp-bullets li{font-size:12.5px;color:var(--text-muted);padding-left:14px;position:relative;line-height:1.7;}
.exp-bullets li
